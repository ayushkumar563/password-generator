<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <main class="generator-container">
        <header>
            <h1>Generate Password</h1>
            <p>Create strong, secure passwords instantly.</p>
        </header>

        <section class="result-section">
            <input type="text" id="password-result" readonly placeholder="P4$5W0rD!">
            <button id="copy-btn" aria-label="Copy Password">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </button>
        </section>

        <section class="settings-section">
            <div class="setting-group length-group">
                <div class="length-header">
                    <label for="length-slider">Character Length</label>
                    <span id="length-val">16</span>
                </div>
                <input type="range" id="length-slider" min="8" max="32" value="16">
            </div>

            <div class="setting-group checkbox-group">
                <label class="custom-checkbox">
                    <input type="checkbox" id="uppercase" checked>
                    <span class="checkmark"></span>
                    Include Uppercase Letters
                </label>
            </div>
            
            <div class="setting-group checkbox-group">
                <label class="custom-checkbox">
                    <input type="checkbox" id="lowercase" checked>
                    <span class="checkmark"></span>
                    Include Lowercase Letters
                </label>
            </div>
            
            <div class="setting-group checkbox-group">
                <label class="custom-checkbox">
                    <input type="checkbox" id="numbers" checked>
                    <span class="checkmark"></span>
                    Include Numbers
                </label>
            </div>
            
            <div class="setting-group checkbox-group">
                <label class="custom-checkbox">
                    <input type="checkbox" id="symbols" checked>
                    <span class="checkmark"></span>
                    Include Symbols
                </label>
            </div>

            <div class="strength-section">
                <span>Strength</span>
                <div class="strength-bars">
                    <div class="bar" id="bar-1"></div>
                    <div class="bar" id="bar-2"></div>
                    <div class="bar" id="bar-3"></div>
                    <div class="bar" id="bar-4"></div>
                </div>
            </div>

            <button id="generate-btn">
                Generate <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
